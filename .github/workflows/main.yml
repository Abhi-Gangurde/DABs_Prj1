name: Deploy to Dev/Prod Databricks Workspace

on:
  pull_request:
    paths-ignore:
      - .github/**
    branches:
      - main
  workflow_dispatch: # 👈 This adds the manual "Run workflow" button in GitHub
jobs:
  dev-deploy:
    runs-on: ubuntu-latest
    environment: development
    # env:
    #   DATABRICKS_HOST: ${{ secrets.DEV_DEPLOY_URL }}
    #   DATABRICKS_TOKEN: ${{ secrets.DEV_DEPLOY_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bundle To DEV
        run: databricks bundle deploy --target dev
        env:
          DATABRICKS_HOST: ${{ secrets.DEV_DEPLOY_URL }}
          DATABRICKS_TOKEN: ${{ secrets.DEV_DEPLOY_TOKEN }}

  prd-deploy:
    needs: dev-deploy
    runs-on: ubuntu-latest
    environment: production
    # env:
    #   DATABRICKS_HOST: ${{ secrets.PROD_DEPLOY_URL }}
    #   DATABRICKS_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          
      - name: Deploy Bundle To PROD
        run: databricks bundle deploy --target prod
        env:
          DATABRICKS_HOST: ${{ secrets.PROD_DEPLOY_URL }}
          DATABRICKS_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}
