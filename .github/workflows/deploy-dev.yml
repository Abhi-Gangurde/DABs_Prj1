name: Deploy to Dev

on:
    push:
        paths-ignore:
            - .github/**
        branches:
            - dev
jobs:
    deploy:
        uses: ./.github/workflows/deploy-template.yml
        with:
            target_ws: dev
            secrets:
                databricks_host: ${{ secrets.DEV_DEPLOY_URL }}
                databricks_token: ${{ secrets.DEV_DEPLOY_TOKEN }}