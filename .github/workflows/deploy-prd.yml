name: Deploy to PROD Databricks Workspace

on:
  push:
    paths-ignore:
      - .github/**
    branches:
      - main
  
  pull_request:
    paths-ignore:
      - .github/**
    branches:
      - main
  workflow_dispatch: # 👈 This adds the manual "Run workflow" button in GitHub

permissions:
  contents: read
  id-token: write

jobs:
  prod-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate Bundle To PROD
        run: databricks bundle validate --target prod  
        env:
          DATABRICKS_HOST: ${{ secrets.PROD_DEPLOY_URL }}
          DATABRICKS_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}

      - name: Deploy Bundle To PROD
        run: databricks bundle deploy --target prod
        env:
          DATABRICKS_HOST: ${{ secrets.PROD_DEPLOY_URL }}
          DATABRICKS_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
