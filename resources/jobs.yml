resources:

  jobs:
    customer_ingestion_job:
      name: customer_ingestion_job
      email_notifications:
        on_failure: ${var.notification_email}
      tasks:
        - task_key: ingest_customers_ipynb
          notebook_task:
            notebook_path: ../src/ingestion.ipynb
            base_parameters:
              catalog_name: ${var.catalog_name}
              storage_location: ${var.storage_location}
